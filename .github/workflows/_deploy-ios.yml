name: Deploy iOS

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (prod or staging)"
      bundle-id:
        required: true
        type: string
        description: "iOS bundle identifier"
      app-name:
        required: true
        type: string
        description: "Display name of the app"
      flavor:
        required: false
        type: string
        default: ""
        description: "Flutter flavor to build (leave empty if app has no flavors)"
      flutter-version:
        required: false
        type: string
        default: ""
        description: "Flutter version (e.g. 3.22.0). Leave empty for latest stable."
      version:
        required: false
        type: string
        default: ""
        description: "Version string (e.g. 1.4.2+42). If empty, reads from pubspec.yaml"
    secrets:
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true

jobs:
  build-and-deploy-ios:
    name: Build & Deploy iOS (${{ inputs.environment }})
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p $RUNNER_TEMP/asc_keys
          echo -n "$API_PRIVATE_KEY" > $RUNNER_TEMP/asc_keys/AuthKey_${API_KEY_ID}.p8

          # Also setup for altool upload
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS build
        run: |
          FLAVOR="${{ inputs.flavor }}"
          VERSION="${{ inputs.version }}"
          VERSION_ARGS=""
          if [ -n "$VERSION" ]; then
            BUILD_NAME="${VERSION%%+*}"
            BUILD_NUMBER="${VERSION##*+}"
            VERSION_ARGS="--build-name=$BUILD_NAME --build-number=$BUILD_NUMBER"
          fi

          # Build without signing to trigger all Flutter migrations (UIScene, pbxproj, Podfile)
          # and compile Dart code. This also writes Generated.xcconfig with dart defines + version.
          flutter build ios --no-codesign \
            --release \
            ${FLAVOR:+--flavor $FLAVOR} \
            --dart-define=ENV=${{ inputs.environment }} \
            --dart-define=APP_NAME="${{ inputs.app-name }}" \
            --dart-define=BUNDLE_ID=${{ inputs.bundle-id }} \
            $VERSION_ARGS

          # Re-run pod install in case Podfile was upgraded during migration
          cd ios && pod install --repo-update 2>/dev/null || true && cd ..

      - name: Detect team ID
        id: team
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Get the team ID (provider short name) associated with the API key
          OUTPUT=$(xcrun altool --list-providers --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID" 2>&1)
          echo "$OUTPUT"
          # Extract team ID: 10-character alphanumeric string (skip header/separator lines)
          TEAM_ID=$(echo "$OUTPUT" | grep -oE '\b[A-Z0-9]{10}\b' | head -1)
          echo "Detected team ID: $TEAM_ID"
          echo "team_id=$TEAM_ID" >> "$GITHUB_OUTPUT"

      - name: Archive with automatic signing
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ steps.team.outputs.team_id }}
        run: |
          SCHEME="${{ inputs.flavor || 'Runner' }}"

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/asc_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Generate export options from archive
        env:
          TEAM_ID: ${{ steps.team.outputs.team_id }}
        run: |
          ARCHIVE="$RUNNER_TEMP/Runner.xcarchive"

          # Extract provisioning profile UUIDs from the signed archive
          PROFILES_XML="<dict>"

          # Main app profile
          MAIN_APP=$(find "$ARCHIVE/Products/Applications" -maxdepth 1 -name "*.app" | head -1)
          if [ -f "$MAIN_APP/embedded.mobileprovision" ]; then
            MAIN_UUID=$(/usr/bin/security cms -D -i "$MAIN_APP/embedded.mobileprovision" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
            MAIN_BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$MAIN_APP/Info.plist")
            PROFILES_XML="$PROFILES_XML
              <key>$MAIN_BUNDLE</key>
              <string>$MAIN_UUID</string>"
            echo "Main app: $MAIN_BUNDLE -> $MAIN_UUID"
          fi

          # Extension profiles (if any)
          if [ -d "$MAIN_APP/PlugIns" ]; then
            for EXTENSION in "$MAIN_APP/PlugIns"/*.appex; do
              if [ -f "$EXTENSION/embedded.mobileprovision" ]; then
                EXT_UUID=$(/usr/bin/security cms -D -i "$EXTENSION/embedded.mobileprovision" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
                EXT_BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXTENSION/Info.plist")
                PROFILES_XML="$PROFILES_XML
              <key>$EXT_BUNDLE</key>
              <string>$EXT_UUID</string>"
                echo "Extension: $EXT_BUNDLE -> $EXT_UUID"
              fi
            done
          fi

          PROFILES_XML="$PROFILES_XML
            </dict>"

          # Detect signing certificate name from the archive
          SIGN_IDENTITY=$(codesign -dvv "$MAIN_APP" 2>&1 | grep "Authority=" | head -1 | sed 's/Authority=//')
          echo "Signing identity: $SIGN_IDENTITY"

          cat > $RUNNER_TEMP/ExportOptions.plist <<PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingCertificate</key>
              <string>${SIGN_IDENTITY}</string>
              <key>provisioningProfiles</key>
              ${PROFILES_XML}
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF

          echo "Generated ExportOptions.plist:"
          cat $RUNNER_TEMP/ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Cleanup
        if: always()
        run: |
          rm -rf $RUNNER_TEMP/asc_keys || true
          rm -rf ~/.appstoreconnect || true
          rm -rf $RUNNER_TEMP/Runner.xcarchive || true
          rm -rf $RUNNER_TEMP/export || true

name: Deploy iOS

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (prod or staging)"
      bundle-id:
        required: true
        type: string
        description: "iOS bundle identifier"
      app-name:
        required: true
        type: string
        description: "Display name of the app"
      flavor:
        required: false
        type: string
        default: ""
        description: "Flutter flavor to build (leave empty if app has no flavors)"
      flutter-version:
        required: false
        type: string
        default: ""
        description: "Flutter version (e.g. 3.22.0). Leave empty for latest stable."
      version:
        required: false
        type: string
        default: ""
        description: "Version string (e.g. 1.4.2+42). If empty, reads from pubspec.yaml"
    secrets:
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true

jobs:
  build-and-deploy-ios:
    name: Build & Deploy iOS (${{ inputs.environment }})
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p $RUNNER_TEMP/asc_keys
          echo -n "$API_PRIVATE_KEY" > $RUNNER_TEMP/asc_keys/AuthKey_${API_KEY_ID}.p8

          # Also setup for altool upload
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare iOS build
        run: |
          FLAVOR="${{ inputs.flavor }}"
          VERSION="${{ inputs.version }}"
          VERSION_ARGS=""
          if [ -n "$VERSION" ]; then
            BUILD_NAME="${VERSION%%+*}"
            BUILD_NUMBER="${VERSION##*+}"
            VERSION_ARGS="--build-name=$BUILD_NAME --build-number=$BUILD_NUMBER"
          fi

          # Build without signing to trigger all Flutter migrations (UIScene, pbxproj, Podfile)
          # and compile Dart code. This also writes Generated.xcconfig with dart defines + version.
          flutter build ios --no-codesign \
            --release \
            ${FLAVOR:+--flavor $FLAVOR} \
            --dart-define=ENV=${{ inputs.environment }} \
            --dart-define=APP_NAME="${{ inputs.app-name }}" \
            --dart-define=BUNDLE_ID=${{ inputs.bundle-id }} \
            $VERSION_ARGS

          # Re-run pod install in case Podfile was upgraded during migration
          cd ios && pod install --repo-update 2>/dev/null || true && cd ..

      - name: Detect team ID
        id: team
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Get the team ID (provider short name) associated with the API key
          OUTPUT=$(xcrun altool --list-providers --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID" 2>&1)
          echo "$OUTPUT"
          TEAM_ID=$(echo "$OUTPUT" | awk 'NR>2 && NF>0 {print $NF}' | head -1)
          echo "Detected team ID: $TEAM_ID"
          echo "team_id=$TEAM_ID" >> "$GITHUB_OUTPUT"

      - name: Generate export options
        env:
          TEAM_ID: ${{ steps.team.outputs.team_id }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Archive with automatic signing
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ steps.team.outputs.team_id }}
        run: |
          SCHEME="${{ inputs.flavor || 'Runner' }}"

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/asc_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/asc_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Cleanup
        if: always()
        run: |
          rm -rf $RUNNER_TEMP/asc_keys || true
          rm -rf ~/.appstoreconnect || true
          rm -rf $RUNNER_TEMP/Runner.xcarchive || true
          rm -rf $RUNNER_TEMP/export || true

name: Deploy iOS

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (prod or staging)"
      bundle-id:
        required: true
        type: string
        description: "iOS bundle identifier"
      app-name:
        required: true
        type: string
        description: "Display name of the app"
      flavor:
        required: false
        type: string
        default: ""
        description: "Flutter flavor to build (leave empty if app has no flavors)"
      flutter-version:
        required: false
        type: string
        default: ""
        description: "Flutter version (e.g. 3.22.0). Leave empty for latest stable."
      version:
        required: false
        type: string
        default: ""
        description: "Version string (e.g. 1.4.2+42). If empty, reads from pubspec.yaml"
    secrets:
      IOS_P12_DISTRIBUTION_CERTIFICATE_BASE64:
        required: true
      IOS_P12_DISTRIBUTION_CERTIFICATE_PASSWORD:
        required: true
      IOS_DISTRIBUTION_PROVISIONING_PROFILE_BASE64:
        required: true
      IOS_RUNNER_LOCAL_KEYCHAIN_PASSWORD:
        required: true
      IOS_EXPORT_OPTIONS_BASE64:
        required: true
      IOS_EXTENSION_PROFILES_JSON:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true

jobs:
  build-and-deploy-ios:
    name: Build & Deploy iOS (${{ inputs.environment }})
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profiles
        env:
          P12_BASE64: ${{ secrets.IOS_P12_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_DISTRIBUTION_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_RUNNER_LOCAL_KEYCHAIN_PASSWORD }}
          EXTENSION_PROFILES_JSON: ${{ secrets.IOS_EXTENSION_PROFILES_JSON }}
        run: |
          # Decode certificate and main profile
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          PROFILE_PATH=$RUNNER_TEMP/distribution.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install main provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          # Install extension provisioning profiles (if any)
          if [ -n "$EXTENSION_PROFILES_JSON" ]; then
            echo "$EXTENSION_PROFILES_JSON" | python3 -c "
          import json, sys, base64
          profiles = json.load(sys.stdin)
          for bundle_id, profile_b64 in profiles.items():
              safe_name = bundle_id.replace('.', '_')
              path = '$RUNNER_TEMP/' + safe_name + '.mobileprovision'
              with open(path, 'wb') as f:
                  f.write(base64.b64decode(profile_b64))
              print(f'Installed extension profile: {bundle_id} -> {path}')
          "

            # Copy all decoded extension profiles to the provisioning profiles directory
            for f in $RUNNER_TEMP/*.mobileprovision; do
              [ -f "$f" ] && cp "$f" ~/Library/MobileDevice/Provisioning\ Profiles/
            done
          fi

      - name: Decode export options plist
        env:
          EXPORT_OPTIONS_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_BASE64 }}
        run: |
          echo -n "$EXPORT_OPTIONS_BASE64" | base64 --decode -o $RUNNER_TEMP/ExportOptions.plist

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure signing for CI
        env:
          EXTENSION_PROFILES_JSON: ${{ secrets.IOS_EXTENSION_PROFILES_JSON }}
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            # Switch all targets from automatic to manual signing
            sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
            # Clear development team (manual signing doesn't need it)
            sed -i '' 's/DEVELOPMENT_TEAM = [^;]*/DEVELOPMENT_TEAM = /g' "$PBXPROJ"

            # Handle extension targets
            for ext_dir in ios/*/; do
              ext_name=$(basename "$ext_dir")
              if [ "$ext_name" != "Runner" ] && [ "$ext_name" != "Pods" ] && [ "$ext_name" != "Flutter" ] && [ "$ext_name" != "RunnerTests" ] && [ -d "$ext_dir" ]; then
                if [ -n "$EXTENSION_PROFILES_JSON" ]; then
                  echo "Extension target found: $ext_name (profiles provided, signing enabled)"
                else
                  echo "Extension target found: $ext_name (no profiles, disabling signing)"
                  # Disable code signing for extensions that don't have provisioning profiles
                  sed -i '' "/Begin.*${ext_name}/,/End.*${ext_name}/s/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g" "$PBXPROJ"
                fi
              fi
            done
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS release
        env:
          FLUTTER_XCODE_SCHEME: ${{ inputs.flavor || 'Runner' }}
        run: |
          FLAVOR="${{ inputs.flavor }}"
          flutter build ipa \
            --release \
            ${FLAVOR:+--flavor $FLAVOR} \
            --dart-define=ENV=${{ inputs.environment }} \
            --dart-define=APP_NAME="${{ inputs.app-name }}" \
            --dart-define=BUNDLE_ID=${{ inputs.bundle-id }} \
            --export-options-plist=$RUNNER_TEMP/ExportOptions.plist \
            ${{ inputs.version != '' && format('--build-number={0}', inputs.version) || '' }}

      - name: Setup App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision || true
          rm -rf ~/.appstoreconnect || true

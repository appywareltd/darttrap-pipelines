name: Flutter Build Check

on:
  workflow_call:
    inputs:
      flavor:
        required: false
        type: string
        default: ""
        description: "Flutter flavor to build (leave empty if app has no flavors)"
      flutter-version:
        required: false
        type: string
        default: ""
        description: "Flutter version (e.g. 3.22.0). Leave empty for latest stable."
      platform:
        required: false
        type: string
        default: "ios_android"
        description: "Target platform (ios_android, ios_only, android_only)"

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android
    needs: analyze
    if: inputs.platform == 'ios_android' || inputs.platform == 'android_only'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: |
          flutter build apk \
            --debug \
            ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }}

  build-ios:
    name: Build iOS
    needs: analyze
    if: inputs.platform == 'ios_android' || inputs.platform == 'ios_only'
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios \
            --debug \
            --no-codesign \
            ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }}

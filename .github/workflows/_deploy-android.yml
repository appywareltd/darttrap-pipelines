name: Deploy Android

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (prod or staging)"
      package-name:
        required: true
        type: string
        description: "Android package name"
      app-name:
        required: true
        type: string
        description: "Display name of the app"
      flavor:
        required: true
        type: string
        description: "Flutter flavor to build"
      flutter-version:
        required: false
        type: string
        default: ""
        description: "Flutter version (e.g. 3.22.0). Leave empty for latest stable."
      version:
        required: false
        type: string
        default: ""
        description: "Version string (e.g. 1.4.2+42). If empty, reads from pubspec.yaml"
      track:
        required: false
        type: string
        default: "internal"
        description: "Play Store track (internal, alpha, beta, production)"
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      PLAY_STORE_JSON_KEY:
        required: true

jobs:
  build-and-deploy-android:
    name: Build & Deploy Android (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOL
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$RUNNER_TEMP/keystore.jks
          EOL

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter (specific version)
        if: inputs.flutter-version != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: stable
          cache: true

      - name: Setup Flutter (latest stable)
        if: inputs.flutter-version == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android App Bundle
        run: |
          flutter build appbundle \
            --release \
            --flavor ${{ inputs.flavor }} \
            --dart-define=ENV=${{ inputs.environment }} \
            --dart-define=APP_NAME="${{ inputs.app-name }}" \
            --dart-define=BUNDLE_ID=${{ inputs.package-name }} \
            ${{ inputs.version != '' && format('--build-number={0}', inputs.version) || '' }}

      - name: Setup Play Store credentials
        env:
          PLAY_STORE_JSON: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          echo -n "$PLAY_STORE_JSON" > $RUNNER_TEMP/play-store-key.json

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ runner.temp }}/play-store-key.json
          packageName: ${{ inputs.package-name }}
          releaseFiles: build/app/outputs/bundle/${{ inputs.flavor }}Release/*.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Cleanup
        if: always()
        run: |
          rm -f $RUNNER_TEMP/keystore.jks || true
          rm -f $RUNNER_TEMP/play-store-key.json || true
          rm -f android/key.properties || true
